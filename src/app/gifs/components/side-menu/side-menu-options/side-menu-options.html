<div class="space-y-6 md:space-y-10 mt-10">
  <div class="flex border-2 border-gray-200 rounded-md focus-within:ring-2 ring-teal-500">
    <input type="text" class="w-full rounded-tl-md rounded-bl-md px-2 py-3 text-sm text-gray-600 focus:outline-none"
      placeholder="Search" />
    <button class="rounded-tr-md rounded-br-md px-2 py-3 hidden md:block">
      <svg class="w-4 h-4 fill-current" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd"
          d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
          clip-rule="evenodd"></path>
      </svg>
    </button>
  </div>

  <div id="menu" class="flex flex-col space-y-2">
    @for (item of menuOptions; track item.route) {
    <a [routerLink]="item.route" routerLinkActive="bg-teal-500 text-white" class="flex gap-2 items-center group text-gray-700 py-2 px-2 hover:bg-teal-500 hover:text-white hover:text-base rounded-md">
      <i [class]="item.icon"></i>
      <div class="flex flex-col">
        <span class="text-md font-bold leading-5">{{ item.label }}</span>
        <span routerLinkActive="text-white/90" class="text-sm text-gray-500 group-hover:text-white/90 hidden md:block">{{ item.sublabel }}</span>
      </div>
    </a>
    }
  </div>
</div>
