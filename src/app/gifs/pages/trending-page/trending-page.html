<!-- <gifs-list [gifs]="gifService.trendingGifs()"> -->


<div 
  class="h-screen p-4 overflow-y-scroll grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" 
  (scroll)="onScroll($event)"
  #groupDiv
>
  @for (group of gifService.trendingGifsGroups(); track $index) {
  <div class="grid gap-4">
    @for (gif of group; track gif.id) {
    <div>
      <img 
        class="h-full w-full rounded-lg object-cover" 
        [src]="gif.url"
        [alt]="gif.title"
      />
    </div>
    }
  </div>
  }
</div>
